<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Stylized E Icon -->
  <g filter="url(#shadow)">
    <!-- Top Bar -->
    <path d="M40 50C40 40 50 40 60 40H140C150 40 160 50 160 60V75C160 85 150 90 140 90H80C70 90 65 95 65 105C65 115 70 120 80 120H130C140 120 150 125 150 135V150C150 160 140 170 130 170H60C45 170 40 160 40 150V50Z" fill="url(#logo-gradient)" />
    
    <!-- Curved Layers to mimic the Ribbon look -->
    <path d="M40 70C40 70 45 100 80 100H130" stroke="white" stroke-width="2" stroke-opacity="0.1" fill="none" />
    <path d="M40 130C40 130 45 160 80 160H130" stroke="white" stroke-width="2" stroke-opacity="0.1" fill="none" />
  </g>
</svg>
